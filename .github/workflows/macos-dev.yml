name: macOS Dev Checks

on:
  push:
    branches: [ "mac-port" ]
  pull_request:
    branches: [ "mac-port" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  macos-check-and-test:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        key: macos-latest-v1

    - name: Cargo check
      run: cargo check --workspace

    - name: Cargo test
      run: cargo test --workspace --verbose

    - name: Build release binary
      run: cargo build -p mtrm --release --verbose

    - name: Prepare macOS artifacts
      run: |
        mkdir -p target/dist
        cp target/release/mtrm target/dist/mtrm
        tar -C target/dist -czf target/dist/mtrm-macos.tar.gz mtrm

    - name: Upload macOS binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: mtrm-macos
        path: target/dist/mtrm
        if-no-files-found: error

    - name: Upload macOS archive artifact
      uses: actions/upload-artifact@v4
      with:
        name: mtrm-macos-tarball
        path: target/dist/mtrm-macos.tar.gz
        if-no-files-found: error
