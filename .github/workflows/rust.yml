name: Test and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test-and-build:
    # The project is currently Linux-first.
    # Keep this workflow file as the place to reintroduce other targets later,
    # but only the Ubuntu path is considered supported and enforced right now.
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2 # Маст-хэв для ускорения Rust
      with:
        key: ubuntu-latest-v1

    - name: Run tests
      run: cargo test --verbose

    - name: Build release
      run: cargo build --release --verbose

    - name: Install cargo-deb
      run: cargo install cargo-deb --locked

    - name: Build Debian package
      run: cargo deb -p mtrm --no-build --output target/debian/mtrm.deb

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mtrm-linux
        path: target/release/mtrm
        if-no-files-found: error # На этом этапе лучше знать, если билд не создался

    - name: Upload Debian package
      uses: actions/upload-artifact@v4
      with:
        name: mtrm-linux-deb
        path: target/debian/mtrm.deb
        if-no-files-found: error

  create-release:
    needs: test-and-build
    # На теге всегда пытаемся собрать релиз из тех артефактов, которые реально доехали.
    if: ${{ always() && startsWith(github.ref, 'refs/tags/v') }}
    
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
        continue-on-error: true # Если какой-то артефакт отсутствует, не падаем

      - name: Check downloaded artifacts
        id: artifacts
        shell: bash
        run: |
          if [ -f artifacts/mtrm-linux/mtrm ] || [ -f artifacts/mtrm-linux-deb/mtrm.deb ] || [ -f artifacts/mtrm-windows/mtrm.exe ] || [ -f artifacts/mtrm-macos/mtrm ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Release
        if: steps.artifacts.outputs.has_files == 'true'
        uses: softprops/action-gh-release@v2
        with:
          # Ищем файлы рекурсивно во всех подпапках скачанных артефактов
          files: |
            artifacts/mtrm-linux/mtrm
            artifacts/mtrm-linux-deb/mtrm.deb
            artifacts/mtrm-windows/mtrm.exe
            artifacts/mtrm-macos/mtrm
          fail_on_unmatched_files: false # Чтобы не падать, если одного из файлов нет
          generate_release_notes: true
