name: Test and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ] # Запускать релиз при пуше тега, например v1.0.0
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: mtrm-linux
            binary_path: target/release/mtrm
          - os: windows-latest
            artifact_name: mtrm-windows
            binary_path: target/release/mtrm.exe
          - os: macos-latest
            artifact_name: mtrm-macos
            binary_path: target/release/mtrm

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Run tests
      run: cargo test --verbose
    - name: Build release
      run: cargo build --release --verbose
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.binary_path }}

  # НОВЫЙ БЛОК: Создание релиза
  create-release:
    needs: test-and-build
    if: startsWith(github.ref, 'refs/tags/v') # Только если мы создали тег v...
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mtrm-linux/mtrm
            mtrm-windows/mtrm.exe
            mtrm-macos/mtrm
